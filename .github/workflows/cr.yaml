name: CR

on:
  push:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'tests/**'
      - 'docs/**'
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 22
          cache: true

      - name: Build
        run: vp pack

      - run: vp dlx pkg-pr-new publish
